# Conexao com o banco - vem de variaveis de ambiente
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
# Driver e dialect sao auto-detectados pelo Spring Boot a partir da URL jdbc:postgresql

# Hibernate / JPA
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}
spring.jpa.show-sql=${SHOW_SQL:true}

# CORS - origens permitidas (lista separada por virgula). Em prod: URL do Vercel.
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}

# Servidor - Railway/Render injetam a porta via PORT; fallback SERVER_PORT, depois 8080
server.port=${PORT:${SERVER_PORT:8080}}