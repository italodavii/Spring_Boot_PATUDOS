# Conexao com o banco. Em producao (Railway) vem das env vars DB_URL/DB_USER/DB_PASSWORD.
# Os defaults abaixo sao so para rodar local (Postgres do docker-compose.dev.yml na porta 5433),
# para o projeto subir direto no IntelliJ sem precisar configurar env vars.
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5433/patudos}
spring.datasource.username=${DB_USER:patudos}
spring.datasource.password=${DB_PASSWORD:senhalocal123}
# Driver e dialect sao auto-detectados pelo Spring Boot a partir da URL jdbc:postgresql

# Hibernate / JPA
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}
spring.jpa.show-sql=${SHOW_SQL:true}

# CORS - origens permitidas (lista separada por virgula). Em prod: URL do Vercel.
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}

# JWT - segredo (>= 32 bytes para HS256) e validade em ms (default 24h). Trocar JWT_SECRET em producao.
jwt.secret=${JWT_SECRET:dev-secret-patudos-troque-em-producao-min-32-bytes-0123456789}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Admin inicial (seed na inicializacao). Definir ADMIN_EMAIL/ADMIN_PASSWORD no Railway.
admin.email=${ADMIN_EMAIL:admin@patudos.org}
admin.password=${ADMIN_PASSWORD:patudos123}
admin.nome=${ADMIN_NOME:Administrador Patudos}

# E-mail (codigos de verificacao / recuperacao de senha).
# Em DEV fica DESLIGADO: os codigos saem no console (EmailServiceLogDev), sem precisar de SMTP.
# Em PROD: APP_EMAIL_ENABLED=true + credenciais SMTP via env do Spring
# (SPRING_MAIL_HOST / SPRING_MAIL_PORT / SPRING_MAIL_USERNAME / SPRING_MAIL_PASSWORD - Resend/SendGrid).
app.email.enabled=${APP_EMAIL_ENABLED:false}
app.from-email=${APP_FROM_EMAIL:nao-responder@patudosdarua.com.br}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Login com Google — Client ID do OAuth (publico, nao e segredo). Prod sobrescreve via GOOGLE_CLIENT_ID.
google.client-id=${GOOGLE_CLIENT_ID:724829699555-j1racqepgr19togimgqobh1pukqnqqap.apps.googleusercontent.com}

# Servidor - Railway/Render injetam a porta via PORT (sobrescreve tudo em producao).
# Default local 8081 porque a 8080 costuma estar ocupada pelo XAMPP/Apache nesta maquina.
server.port=${PORT:${SERVER_PORT:8081}}