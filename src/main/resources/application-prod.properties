# ====== Perfil de PRODUÇÃO ======
# Ativado por SPRING_PROFILES_ACTIVE=prod (setar no Railway).
# Herda o application.properties e sobrescreve os SEGREDOS removendo os defaults de dev:
# se a variável de ambiente faltar, o placeholder ${X} não resolve e a aplicação NÃO sobe
# (fail-fast) — impedindo rodar em produção com credenciais públicas de desenvolvimento.

# Banco (obrigatório em prod)
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}

# Segredos (obrigatórios em prod — sem default)
jwt.secret=${JWT_SECRET}
admin.password=${ADMIN_PASSWORD}
